<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Netlify Form Definitions</title></head>
<body>
  <!-- Contact form -->
  <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="contact" />
    <input name="bot-field" />
    <input name="name" />
    <input name="company" />
    <input name="email" />
    <input name="phone" />
    <select name="service"></select>
    <textarea name="message"></textarea>
  </form>

  <!-- Inquiry modal form -->
  <form name="inquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="inquiry" />
    <input name="bot-field" />
    <input name="name" />
    <input name="company" />
    <input name="email" />
    <input name="phone" />
    <select name="service"></select>
    <textarea name="message"></textarea>
  </form>
</body>
</html>
